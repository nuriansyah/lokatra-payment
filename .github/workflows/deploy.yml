name: Deploy Lokatra Payment

on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: deploy-lokatra-payment
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login ke GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:latest
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.LIGHTHOUSE_HOST }}
          username: ${{ secrets.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          envs: GHCR_TOKEN,IMAGE_TAG,GITHUB_ACTOR
          script: |
            set -e

            SERVICE="lokatra-payment"
            APP_DIR="/opt/lokatra/payment"

            echo "$GHCR_TOKEN" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" \
              --password-stdin

            cd "$APP_DIR"

            docker network inspect lokatra-net >/dev/null 2>&1 || docker network create lokatra-net

            echo "Checking compose file..."
            test -f docker-compose.yml || {
              echo "ERROR: $APP_DIR/docker-compose.yml not found"
              exit 1
            }

            echo "Checking env file..."
            test -f .env || {
              echo "ERROR: $APP_DIR/.env not found"
              exit 1
            }

            echo "Checking compose services..."
            docker compose config --services

            docker compose config --services | grep -qx "$SERVICE" || {
              echo "ERROR: service $SERVICE not found"
              echo "Current services:"
              docker compose config --services
              exit 1
            }

            mkdir -p "$APP_DIR/secrets"

            export IMAGE_TAG="$IMAGE_TAG"

            docker compose pull "$SERVICE"
            docker compose up -d --no-deps --force-recreate "$SERVICE"

            docker image prune -f

            docker compose ps
            docker logs --tail=80 "$SERVICE"