name: Deploy Lokatra Payment

on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: deploy-lokatra-payment
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login ke Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login ke GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:latest
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.LIGHTHOUSE_HOST }}
          username: ${{ secrets.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          envs: GHCR_TOKEN,IMAGE_TAG,GITHUB_ACTOR
          script: |
            set -e

            echo "$GHCR_TOKEN" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" \
              --password-stdin

            cd /opt/lokatra/payment

            docker network inspect lokatra-net >/dev/null 2>&1 || docker network create lokatra-net

            export IMAGE_TAG="$IMAGE_TAG"

            docker compose pull lokatra-payment
            docker compose up -d --no-deps --force-recreate lokatra-payment

            docker image prune -f

            docker compose ps
            docker logs --tail=80 lokatra-payment