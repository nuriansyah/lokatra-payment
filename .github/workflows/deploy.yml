name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: Login ke GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:latest
            ghcr.io/${{ github.repository_owner }}/lokatra-payment:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTHOUSE_HOST }}
          username: ${{ secrets.LIGHTHOUSE_USER }}
          key: ${{ secrets.LIGHTHOUSE_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/lokatra-payment:latest
            cd /opt/lokatra
            docker compose up -d --no-deps --force-recreate lokatra-payment
            docker image prune -f